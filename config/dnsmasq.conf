# MiniFMS dnsmasq configuration
# DHCP and DNS server for robot VLANs and LAN

# ----- General Settings -----

# Don't read /etc/resolv.conf for upstream DNS
no-resolv

# Upstream DNS servers (used for LAN DNS resolution)
server=8.8.8.8
server=1.1.1.1

# Handle interfaces appearing/disappearing gracefully
bind-dynamic

# Only listen on internal VLAN interfaces (not WAN or bare eth0)
interface=eth0.10
interface=eth0.20
interface=eth0.30
interface=eth0.40
interface=eth0.50
interface=eth0.60
interface=eth0.100
except-interface=eth0
except-interface=eth0.150

# Be authoritative for all DHCP on our networks
dhcp-authoritative

# Log DHCP transactions for debugging
log-dhcp

# ----- Robot VLAN DHCP (VLANs 10, 20, 30, 40, 50, 60) -----
# Range: 10.0.X.100 - 10.0.X.155, 24h lease
dhcp-range=10.0.10.100,10.0.10.155,255.255.255.0,24h
dhcp-range=10.0.20.100,10.0.20.155,255.255.255.0,24h
dhcp-range=10.0.30.100,10.0.30.155,255.255.255.0,24h
dhcp-range=10.0.40.100,10.0.40.155,255.255.255.0,24h
dhcp-range=10.0.50.100,10.0.50.155,255.255.255.0,24h
dhcp-range=10.0.60.100,10.0.60.155,255.255.255.0,24h

# ----- LAN DHCP (VLAN 100) -----
# Range: 10.0.100.50 - 10.0.100.200, 24h lease
# Gateway is automatically set to 10.0.100.5 (this Pi)
dhcp-range=10.0.100.50,10.0.100.200,255.255.255.0,24h
