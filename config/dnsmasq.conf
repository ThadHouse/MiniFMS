# MiniFMS dnsmasq configuration
# DHCP and DNS server for robot VLANs and LAN

# ----- General Settings -----

# Don't read /etc/resolv.conf for upstream DNS
no-resolv

# Upstream DNS servers (used for LAN DNS resolution)
server=8.8.8.8
server=1.1.1.1

# Handle interfaces appearing/disappearing gracefully
bind-dynamic

# Only listen on internal VLAN interfaces (not WAN or bare eth0)
interface=eth0.10
interface=eth0.20
interface=eth0.30
interface=eth0.40
interface=eth0.50
interface=eth0.60
interface=eth0.70
interface=eth0.80
interface=eth0.100
except-interface=eth0
except-interface=eth0.150

# Be authoritative for all DHCP on our networks
dhcp-authoritative

# Log DHCP transactions for debugging
log-dhcp

# ----- Robot VLAN DHCP (VLANs 10, 20, 30, 40, 50, 60, 70, 80) -----
# Range: 10.0.X.100 - 10.0.X.155, 24h lease
# Each VLAN gets tagged ranges so we can set per-VLAN gateway and DNS options
dhcp-range=set:vlan10,10.0.10.100,10.0.10.155,255.255.255.0,24h
dhcp-range=set:vlan20,10.0.20.100,10.0.20.155,255.255.255.0,24h
dhcp-range=set:vlan30,10.0.30.100,10.0.30.155,255.255.255.0,24h
dhcp-range=set:vlan40,10.0.40.100,10.0.40.155,255.255.255.0,24h
dhcp-range=set:vlan50,10.0.50.100,10.0.50.155,255.255.255.0,24h
dhcp-range=set:vlan60,10.0.60.100,10.0.60.155,255.255.255.0,24h
dhcp-range=set:vlan70,10.0.70.100,10.0.70.155,255.255.255.0,24h
dhcp-range=set:vlan80,10.0.80.100,10.0.80.155,255.255.255.0,24h

# Robot VLAN gateway (option 3) and DNS (option 6) — Pi is both
dhcp-option=tag:vlan10,option:router,10.0.10.4
dhcp-option=tag:vlan10,option:dns-server,10.0.10.4
dhcp-option=tag:vlan20,option:router,10.0.20.4
dhcp-option=tag:vlan20,option:dns-server,10.0.20.4
dhcp-option=tag:vlan30,option:router,10.0.30.4
dhcp-option=tag:vlan30,option:dns-server,10.0.30.4
dhcp-option=tag:vlan40,option:router,10.0.40.4
dhcp-option=tag:vlan40,option:dns-server,10.0.40.4
dhcp-option=tag:vlan50,option:router,10.0.50.4
dhcp-option=tag:vlan50,option:dns-server,10.0.50.4
dhcp-option=tag:vlan60,option:router,10.0.60.4
dhcp-option=tag:vlan60,option:dns-server,10.0.60.4
dhcp-option=tag:vlan70,option:router,10.0.70.4
dhcp-option=tag:vlan70,option:dns-server,10.0.70.4
dhcp-option=tag:vlan80,option:router,10.0.80.4
dhcp-option=tag:vlan80,option:dns-server,10.0.80.4

# ----- LAN DHCP (VLAN 100) -----
# Range: 10.0.100.50 - 10.0.100.200, 24h lease
dhcp-range=set:lan,10.0.100.50,10.0.100.200,255.255.255.0,24h
dhcp-option=tag:lan,option:router,10.0.100.5
dhcp-option=tag:lan,option:dns-server,10.0.100.5
