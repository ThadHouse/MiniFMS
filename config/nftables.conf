#!/usr/sbin/nft -f

flush ruleset

# ----- Interface definitions -----
define ROBOT_IFACES = { "eth0.10", "eth0.20", "eth0.30", "eth0.40", "eth0.50", "eth0.60", "eth0.70", "eth0.80" }
define LAN_IFACE = "eth0.100"
define WAN_IFACE = "eth0.150"
define LAN_NET = 10.0.100.0/24

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        # Allow established and related connections
        ct state established,related accept
        ct state invalid drop

        # Allow loopback
        iif lo accept

        # Allow ICMP everywhere (ping, diagnostics)
        ip protocol icmp accept

        # DHCP server: allow requests on all internal interfaces
        iifname $ROBOT_IFACES udp dport { 67, 68 } accept
        iifname $LAN_IFACE udp dport { 67, 68 } accept

        # DNS server: allow queries on all internal interfaces
        iifname $ROBOT_IFACES udp dport 53 accept
        iifname $ROBOT_IFACES tcp dport 53 accept
        iifname $LAN_IFACE udp dport 53 accept
        iifname $LAN_IFACE tcp dport 53 accept

        # SSH: allow from LAN only
        iifname $LAN_IFACE tcp dport 22 accept

        # WAN: allow DHCP client responses only
        iifname $WAN_IFACE udp sport 67 udp dport 68 accept
    }

    chain forward {
        type filter hook forward priority filter; policy drop;

        # Allow established and related connections (return traffic)
        ct state established,related accept
        ct state invalid drop

        # --- LAN to WAN: full internet access ---
        iifname $LAN_IFACE oifname $WAN_IFACE accept

        # --- Robot VLANs to LAN: limited access ---

        # UDP from robot to LAN destination port 1160
        iifname $ROBOT_IFACES oifname $LAN_IFACE ip daddr $LAN_NET udp dport 1160 accept

        # TCP to LAN port 1750
        iifname $ROBOT_IFACES oifname $LAN_IFACE ip daddr $LAN_NET tcp dport 1750 accept

        # ICMP to LAN network
        iifname $ROBOT_IFACES oifname $LAN_IFACE ip daddr $LAN_NET ip protocol icmp accept

        # ICMP to any 10.x.x.4 address (inter-VLAN diagnostics)
        # Translates Cisco wildcard: 10.0.0.4 0.255.255.0 -> match 10.*.*.4
        iifname $ROBOT_IFACES ip daddr & 255.0.0.255 == 10.0.0.4 ip protocol icmp accept

        # All other forwarded traffic is dropped (default policy)
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}

table inet nat {
    chain prerouting {
        type nat hook prerouting priority dstnat;
        # Port forwarding rules are added dynamically by wan-*-forward.sh scripts
    }

    chain postrouting {
        type nat hook postrouting priority srcnat;

        # Masquerade LAN traffic going out WAN for internet access
        oifname $WAN_IFACE masquerade
    }
}
